version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing Maven...
  pre_build:
    commands:
      - echo Logging in to Docker hub...
      - echo  $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
  build:
    commands:
      - cd week-06-Testing
      - echo Building, Testing and packaging the application...
      - mvn clean package
  post_build:
    commands:
      - echo build, Testing, and packaging completed.
artifacts:
  files:
    - week-06-Testing/target/*.jar
  discard-paths: yes
cache:
  paths:
    - '/root/.m2/**/**'