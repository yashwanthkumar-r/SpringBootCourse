version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
  build:
    commands:
      - cd week-06-Testing
      - echo Building, Testing and packaging the application...
      - mvn clean package
  post_build:
    commands:
      - echo build, Testing, and packaging completed.
artifacts:
  files:
    - week-06-Testing/target/*.jar
  discard-paths: yes
cache:
  paths:
    - '/root/.m2/**/**'